# Despliegue GRATIS del backend en Render (plan free, sin tarjeta).
# En Render: New → Blueprint → conecta el repo → detecta este archivo.
# Pega DATABASE_URL (de Neon) y SUPERADMIN_PASSWORD cuando lo pida.
services:
  - type: web
    name: ventanilla-api
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm install && npx prisma generate && npm run build
    # Migraciones versionadas (sin --accept-data-loss). En el primer arranque,
    # 'resolve --applied 0_init' marca la base existente como baseline (no ejecuta
    # SQL ni toca datos); luego 'migrate deploy' aplica solo migraciones nuevas.
    startCommand: (npx prisma migrate resolve --applied 0_init || true) && npx prisma migrate deploy && npm start
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false # se pega manualmente (cadena de conexión de Neon)
      - key: JWT_SECRET
        generateValue: true # Render genera un secreto seguro
      - key: PORT
        value: 10000
      - key: CORS_ORIGIN
        value: https://droko1982.github.io,http://localhost:5173
      - key: SUPERADMIN_EMAIL
        value: admin@ventanilla.co
      - key: SUPERADMIN_PASSWORD
        sync: false # define tu clave de super-admin
